<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>简约搜索主页</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <style>
        * {
            box-sizing: border-box;
        }

 @media screen and (min-width:700px) and (max-width:1200px){
	
        #container {
	padding-top: 200px;
            width: 500px!important;
            height: 520px;
            margin: 0 auto;
        }
	        form {width: 500px!important}
    
}
@media screen and (max-width:700px){
        #container {
	padding-top: 200px;
            width: 300px!important;
            height: 520px;
            margin: 0 auto;
        }
	        form {width: 300px!important}
 }


        body {
            margin: 0;
            padding: 0;
            background: #66CCCC;
            font-weight: 500;
            font-family: "Microsoft YaHei","宋体","Segoe UI", "Lucida Grande", Helvetica, Arial,sans-serif, FreeSans, Arimo;
			text-align: center;
        }

        #container {
	padding-top: 200px;
            width: 700px;
            height: 520px;
            margin: 0 auto;
        }
        div.search {padding: 30px 0;}

        form {
            position: relative;
            width: 600px;
            margin: 0 auto;
        }

        input, button {
            border: none;
            outline: none;
        }

        input {
            width: 100%;
            height: 50px;
            padding-left: 13px;
        }

        a{
            height: 50px;
            width: 50px;
            cursor: pointer;
            position: absolute;
        }

 
        .bar input, .bar a{
            background: transparent;
        }
        .bar input {
            border: 5px solid  #99CCFF;
        }
        .bar a{
            top: 0;
            right: 0;
        }
        .bar a:before {
            font-family: FontAwesome;
            font-size: 18px;
        }
        .bar input:focus {
            border-color:#FF99CC;
        }
    </style>
</head>
<body>
<div id="container">
    <div class="search bar">
        <h2>百度一下</h2>
<form>
    <input type="text" id="find" placeholder="请输入您要搜索的内容..." name="word" baiduSug="2">
	<a  id="aaa"><img src="search.png"></img></a>
</form>
    </div>
</div>
<script type="text/javascript">
	var btn=document.getElementById("submit");
	var ah=document.getElementById("aaa");
	ah.onclick=function(){
		var search=document.getElementById("find").value;
		ah.setAttribute("href","http://www.baidu.com/s?word="+search);
	}
    document.onkeydown = function (e) { 
    var theEvent = window.event || e;
    var code = theEvent.keyCode || theEvent.which || theEvent.charCode;
    if (code == 13) {
        var search=document.getElementById("find").value;
        window.open("http://www.baidu.com/s?word="+search) ;
    }
}
</script>
<script charset="gbk" src="http://www.baidu.com/js/opensug.js"></script>
</body>
</html>
