<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
		<script src="jquery-3.5.1.min.js" type="text/javascript" charset="utf-8"></script>
		<link rel="stylesheet" type="text/css" href="bootstrap.min.css"/>
		<script type="text/javascript">
		$(function(){
			var month=0;var year=0;
			$("#ok").click(function(){
				year=parseInt($("#year").val());
				month=parseInt($("#month").val());
				var content="";
				
				var sum=0;
				for(var i=1990;i<year;i++){
					if((i%4==0&&i%100!=0)||i%400==0){
						sum+=366;
					}else{
						sum+=365;
					}
				}
				for(var i=1;i<month;i++){
					switch(i){
					case 1:case 3:case 5:case 7:case 8:case 10:case 12:
						sum+=31;
						break;
					case 2:
						if(year%400==0||(year%4==0&&year%100!=0)){
							sum+=29;
						}else{
							sum+=28;
						}
						break;
					case 4:case 6:case 9:case 11:
						sum+=30;
						break;
					}
				}
				sum++;
				//System.out.println("日\t一\t二\t三\t四\t五\t六");
				content="<table class='table table-hover table-bordered ' style='text-align: center;width:100%;'><tr><td>日</td><td>一</td><td>二</td><td>三</td><td>四</td><td>五</td><td>六</td></tr><tr>";
				
				for(var i=1;i<=sum%7;i++){content+="<td></td>";}
				var days=0;
				switch(month){
				case 1:case 3:case 5:case 7:case 8:case 10:case 12:
					days=31;
					break;
				case 2:
					if(year%400==0||(year%4==0&&year%100!=0)){
						days=29;
					}else{
						days=28;
					}
					break;
				case 4:case 6:case 9:case 11:
					days=30;
					break;
				}
				console.log(days);
				for (var i = 1; i <=days; i++) {
					content+="<td>"+i+"</td>";
					if((sum++)%7==6){content+="</tr>";}
				}
				content+="</table>";
				console.log(content);
				$("#content").html(content);
			});
		});		
		</script>
	</head>
	<body style="text-align: center;">
		<input type="text" style="width: 100px;" id="year" />年
		<input type="text"  style="width: 100px;" id="month" />月
		<button id="ok" class="btn btn-info">查询</button>
		<div id="content" ></div>
		<script src="bootstrap.min.js" type="text/javascript" charset="utf-8"></script>
	</body>
</html>
